<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Use this product review form to rate an item, select useful features, and share your feedback.">
    <meta name="author" content="Fredrick Oketcho">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <label for="product-name">Product Name <span class="required">*</span></label>
            <select id="product-name" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating <span class="required">*</span></legend>
                <div class="rating-container">
                    <label for="rating-1"><input type="radio" id="rating-1" name="rating" value="1" required><span aria-hidden="true">&#9734;</span><span class="sr-only">1 star</span></label>
                    <label for="rating-2"><input type="radio" id="rating-2" name="rating" value="2" required><span aria-hidden="true">&#9734;&#9734;</span><span class="sr-only">2 stars</span></label>
                    <label for="rating-3"><input type="radio" id="rating-3" name="rating" value="3" required><span aria-hidden="true">&#9734;&#9734;&#9734;</span><span class="sr-only">3 stars</span></label>
                    <label for="rating-4"><input type="radio" id="rating-4" name="rating" value="4" required><span aria-hidden="true">&#9734;&#9734;&#9734;&#9734;</span><span class="sr-only">4 stars</span></label>
                    <label for="rating-5"><input type="radio" id="rating-5" name="rating" value="5" required><span aria-hidden="true">&#9734;&#9734;&#9734;&#9734;&#9734;</span><span class="sr-only">5 stars</span></label>
                </div>
            </fieldset>

            <label for="install-date">Date of Installation <span class="required">*</span></label>
            <input type="date" id="install-date" name="installDate" required>

            <fieldset>
                <legend>Which features did you find useful? (Check all that apply)</legend>
                <label for="feature-durability"><input type="checkbox" id="feature-durability" name="features" value="durability"> Durability</label>
                <label for="feature-ease"><input type="checkbox" id="feature-ease" name="features" value="ease-of-use"> Ease of Use</label>
                <label for="feature-performance"><input type="checkbox" id="feature-performance" name="features" value="performance"> Performance</label>
                <label for="feature-design"><input type="checkbox" id="feature-design" name="features" value="design"> Design</label>
            </fieldset>

            <label for="written-review">Written Review (Optional)</label>
            <textarea id="written-review" name="writtenReview" rows="5"></textarea>

            <label for="user-name">Your Name (Optional)</label>
            <input type="text" id="user-name" name="userName" autocomplete="name">

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Fredrick Oketcho | Uganda</p>
        <p>Last Modification: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
